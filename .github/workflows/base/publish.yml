name: Publish Fylgja Base

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/test.yml
  npm-publish:
    if: "contains(github.event.head_commit.message, 'Release base')"
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - run: cd ./base
      - run: npm ci
      - run: NODE_AUTH_TOKEN="" npm publish --access public
