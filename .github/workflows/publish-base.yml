name: Publish Fylgja Base

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    if: "contains(github.event.head_commit.message, 'Release base')"
    uses: ./.github/workflows/test.yml
  npm-publish:
    needs: test
    if: "contains(github.event.head_commit.message, 'Release base')"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./base
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ""
