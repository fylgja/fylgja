version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    allow:
      - dependency-type: "direct"
    open-pull-requests-limit: 20
    cooldown:
      default-days: 7
      exclude:
        - "@fylgja/base"
        - "@fylgja/tokens"
        - "@fylgja/utilities"
    groups:
      fylgja-deps:
        patterns:
          - "@fylgja/*"
      dev-deps:
        dependency-type: "development"
        exclude-patterns:
          - "@fylgja/*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/_tests/base"
    schedule:
      interval: "monthly"
    allow:
      - dependency-type: "direct"
    cooldown:
      default-days: 7
    groups:
      dev-deps:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/_tests/components"
    schedule:
      interval: "monthly"
    allow:
      - dependency-type: "direct"
    cooldown:
      default-days: 7
    groups:
      dev-deps:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
